name: Release (apt repo + artifacts)

# Tag a version to publish, e.g. `git tag v0.2.1 && git push origin v0.2.1`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and push the gh-pages branch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # keytar builds against libsecret; the repo tooling needs dpkg-dev/apt-utils.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev fakeroot dpkg-dev apt-utils gnupg

      - name: Install & build (AppImage + .deb)
        run: |
          npm ci
          npm run build:linux

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          echo "GPG_KEY_ID=$KEYID" >> "$GITHUB_ENV"

      # Carry forward packages already published so older versions stay installable.
      - name: Fetch previously published packages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: _existing

      - name: Build signed APT repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          REPO_SLUG: ${{ github.repository }}
          EXISTING: _existing
        run: scripts/build-apt-repo.sh

      - name: Deploy repository to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

      - name: Attach installers to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.AppImage
