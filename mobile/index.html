<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- connect-src allows LLM provider APIs + git remotes (https) plus user-
         configured http endpoints (e.g. a LAN/self-hosted gateway or Ollama),
         and blobs. img-src allows blob:/data: for note screenshots. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https: http: blob: data:; worker-src 'self' blob:"
    />
    <title>Paper Reader</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
