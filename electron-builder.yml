appId: de.unituebingen.paperreader
productName: Paper Reader
copyright: Copyright © 2026
directories:
  buildResources: build
  output: dist
# Register as a PDF handler so file managers show "Open with Paper Reader".
fileAssociations:
  - ext: pdf
    name: PDF Document
    description: PDF Document
    mimeType: application/pdf
    role: Viewer
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierrc,.prettierignore,tsconfig.json,tsconfig.*.json}'
  - '!{tailwind.config.ts,postcss.config.js,plan.md}'
asarUnpack:
  - resources/**
# Ship the generated third-party attribution file alongside the app (next to
# app.asar, under resources/). Regenerated by `npm run licenses` at build time.
extraResources:
  - from: build/THIRD_PARTY_LICENSES.txt
    to: THIRD_PARTY_LICENSES.txt
linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: Paper Reader
  # Launch with --no-sandbox so the desktop icon works on distros where the
  # Chromium SUID sandbox can't initialize (e.g. Ubuntu 23.10+ userns lockdown).
  executableArgs:
    - --no-sandbox
  desktop:
    Name: Paper Reader
    Comment: Read, translate and annotate academic papers
npmRebuild: true
